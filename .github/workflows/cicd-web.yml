name: CI/CD Web

on:
  push:
    branches:
      - main
    paths:
      - "packages/common/**"
      - "packages/web/**"
      - "package.json"
  pull_request:
    branches:
      - main
    paths:
      - "packages/common/**"
      - "packages/web/**"
      - "package.json"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-web-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('packages/**/*.ts', 'packages/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-web-

      - name: Install dependencies
        run: npm install

      - name: Build Web app
        run: npm run build:web

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ./DPIP-dev && git pull && docker compose up -d --build dpip-dev && docker system prune -a --volumes -f
